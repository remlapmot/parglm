on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

name: iwyu.yaml

permissions: read-all

jobs:
  iwyu:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v7

      - name: Install IWYU and bear
        run: sudo apt-get install -y iwyu bear

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Build with bear to capture compile commands
        run: bear -- R CMD INSTALL --preclean --no-test-load .

      - name: Run include-what-you-use
        run: |
          shopt -s nullglob
          sources=(src/*.cpp src/*.cc src/*.cxx)
          if [ ${#sources[@]} -eq 0 ]; then
            echo "No C++ sources, skipping."
            exit 0
          fi
          if command -v iwyu_tool >/dev/null; then
            IWYU_TOOL=iwyu_tool
          elif command -v iwyu_tool.py >/dev/null; then
            IWYU_TOOL=iwyu_tool.py
          else
            echo "iwyu_tool not found in PATH"; exit 1
          fi
          "$IWYU_TOOL" -p . "${sources[@]}" 2>&1 | tee iwyu.log || true

      - name: Upload IWYU report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: iwyu-report
          path: iwyu.log
