on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

name: strict-includes-linux.yaml

permissions: read-all

jobs:
  strict-includes-linux:
    runs-on: ubuntu-latest

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          # - { os: ubuntu-latest, r: 'devel', http-user-agent: 'release' }
          - { os: ubuntu-latest, r: release }
          # - { os: ubuntu-latest, r: oldrel-1 }

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v6

      - run: sudo apt-get install -y clang clang-tidy libc++-dev libc++abi-dev

      - run: |
          mkdir -p ~/.R
          cat > ~/.R/Makevars <<'EOF'
          CXX = clang++ -stdlib=libc++
          CXX11 = clang++ -stdlib=libc++
          CXX14 = clang++ -stdlib=libc++
          CXX17 = clang++ -stdlib=libc++
          CXX20 = clang++ -stdlib=libc++
          CPPFLAGS = -D_LIBCPP_REMOVE_TRANSITIVE_INCLUDES=1
          EOF

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Run clang-tidy misc-include-cleaner
        run: |
          shopt -s nullglob
          files=(src/*.cpp src/*.cc src/*.cxx src/*.h src/*.hpp)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No C++ sources in src/, skipping."
            exit 0
          fi
          RCPPFLAGS=$(R CMD config --cppflags)
          LINKING_INCLUDES=$(Rscript -e '
            d <- read.dcf("DESCRIPTION")
            lt <- if ("LinkingTo" %in% colnames(d)) d[, "LinkingTo"] else ""
            pkgs <- trimws(strsplit(lt, ",")[[1]])
            pkgs <- sub("\\(.*\\)", "", pkgs)
            pkgs <- trimws(pkgs)
            pkgs <- pkgs[nzchar(pkgs)]
            paths <- vapply(pkgs, function(p) system.file("include", package = p), character(1))
            cat(paste0("-I", paths[nzchar(paths)], collapse = " "))
          ')
          clang-tidy --checks='-*,misc-include-cleaner' \
            --warnings-as-errors='*' \
            "${files[@]}" \
            -- -std=c++17 -stdlib=libc++ $RCPPFLAGS $LINKING_INCLUDES

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
